<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mortgage Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .results {
            margin-top: 20px;
            padding: 15px;
            background: #eef;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏡 Mortgage Calculator</h1>

    <input type="number" id="credit_score" placeholder="Credit Score (e.g. 720)">
    <input type="number" id="annual_income" placeholder="Annual Income ($)">
    <input type="number" id="monthly_debt" placeholder="Monthly Debt ($)">
    <input type="number" id="down_payment" placeholder="Down Payment ($)">
    <input type="number" id="home_price" placeholder="Home Price ($)">
    <input type="number" id="loan_term" placeholder="Loan Term (years, e.g. 30)">

    <button onclick="calculateMortgage()">Calculate</button>

    <div class="results" id="results" style="display:none;"></div>
</div>

<script>
function calculateMortgage() {

    const credit_score = document.getElementById("credit_score").value;
    const annual_income = document.getElementById("annual_income").value;
    const monthly_debt = document.getElementById("monthly_debt").value;
    const down_payment = document.getElementById("down_payment").value;
    const home_price = document.getElementById("home_price").value;
    const loan_term = document.getElementById("loan_term").value;

    const url = `/mortgage?credit_score=${credit_score}&annual_income=${annual_income}&monthly_debt=${monthly_debt}&down_payment=${down_payment}&home_price=${home_price}&loan_term=${loan_term}`;

    fetch(url)
        .then(response => response.json())
        .then(data => {

            const resultDiv = document.getElementById("results");

            resultDiv.style.display = "block";

            resultDiv.innerHTML = `
                <h3>📊 Results</h3>

                <p><strong>Interest Rate:</strong> ${data.interest_rate.toFixed(2)}%</p>
                <p><strong>Mortgage:</strong> $${data.mortgage.toFixed(2)}</p>
                <p><strong>Property Tax:</strong> $${data.tax.toFixed(2)}</p>
                <p><strong>Insurance:</strong> $${data.insurance.toFixed(2)}</p>
                <p><strong>PMI:</strong> $${data.pmi.toFixed(2)}</p>
                <p><strong>Total Monthly Cost:</strong> $${data.total_cost.toFixed(2)}</p>

                <hr>

                <p><strong>Housing Ratio:</strong> ${(data.housing_ratio * 100).toFixed(2)}%</p>
                <p><strong>Debt Ratio:</strong> ${(data.debt_ratio * 100).toFixed(2)}%</p>

                <p><strong>Affordable:</strong> ${data.affordable ? "✅ YES" : "❌ NO"}</p>

                <hr>

                <p><strong>Max Home Price:</strong> $${data.max_home_price.toLocaleString()}</p>
            `;
        })
        .catch(error => {
            alert("Error calculating mortgage");
            console.error(error);
        });
}
</script>

</body>
</html>
