<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Dashboard</title>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .app {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }
    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    h1 { margin-top: 0; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
    }
    .value {
      font-size: 1.8rem;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="app">

    
    <div class="panel">
      <h1>Financial Score</h1>

      <div class="cards">
        <div class="card">
          <div>Score</div>
          <div class="value">{{ score }}</div>
        </div>

        <div class="card">
          <div>Status</div>
          <div class="value">{{ status }}</div>
        </div>

        <div class="card">
          <div>Survival Months</div>
          <div class="value">{{ survival }}</div>
        </div>
      </div>
    </div>

    
    <div class="panel">
      <h1>Live Interest Rates</h1>
      <button onclick="fetchRates()">Refresh Rates</button>

      <div class="cards" style="margin-top:20px;">
        <div class="card">
          <div>Mortgage Rate</div>
          <div class="value" id="mortgageRate">-</div>
        </div>
        <div class="card">
          <div>Savings Rate</div>
          <div class="value" id="savingsRate">-</div>
        </div>
        <div class="card">
          <div>Auto Loan Rate</div>
          <div class="value" id="autoRate">-</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    async function fetchRates() {
      try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        await res.json();

        document.getElementById('mortgageRate').textContent = '6.5%';
        document.getElementById('savingsRate').textContent = '4.2%';
        document.getElementById('autoRate').textContent = '7.1%';
      } catch (err) {
        console.error(err);
        alert('Failed to fetch rates');
      }
    }
  </script>
</body>
</html>
